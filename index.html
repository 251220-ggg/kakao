<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GANGTERS COMMAND CENTER</title>

    <!-- 카카오맵 SDK -->
    <script
        type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d5dd97a46923dda3a649e5e521134f5f&libraries=services&autoload=false">
    </script>

    <style>

        /* =========================
           GLOBAL THEME
        ========================== */

        :root {
            --bg: #070707;
            --panel: #141414;
            --gold: #ffd700;
            --red: #ff2b2b;
            --text: #f2f2f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

            font-family:
                Impact,
                Haettenschweiler,
                'Arial Narrow Bold',
                sans-serif;

            letter-spacing: 1px;
        }

        body {
            display: flex;
            width: 100vw;
            height: 100vh;

            background:
                radial-gradient(circle at top, #1a1a1a 0%, #050505 70%);

            color: var(--text);

            overflow: hidden;
        }

        /* =========================
           LEFT PANEL
        ========================== */

        #operation-desk {
            width: 400px;
            height: 100%;

            background:
                linear-gradient(180deg, #1a1a1a, #0d0d0d);

            border-right: 4px solid var(--gold);

            display: flex;
            flex-direction: column;

            box-shadow:
                0 0 30px rgba(0,0,0,0.7),
                0 0 15px rgba(255,215,0,0.1);

            position: relative;
        }

        #operation-desk::before {
            content: "";

            position: absolute;
            top: 0;
            right: -2px;

            width: 2px;
            height: 100%;

            background:
                linear-gradient(
                    to bottom,
                    transparent,
                    var(--gold),
                    transparent
                );
        }

        /* =========================
           HEADER
        ========================== */

        .header-box {
            padding: 25px;
            border-bottom: 1px solid #2a2a2a;
        }

        .title {
            font-size: 2rem;
            color: var(--gold);
            text-shadow:
                0 0 10px rgba(255,215,0,0.5),
                0 0 25px rgba(255,215,0,0.2);
        }

        .slogan {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #aaa;
            letter-spacing: 3px;
        }

        .warning {
            margin-top: 15px;
            padding: 10px;

            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);

            color: #ff6b6b;
            font-size: 0.75rem;

            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* =========================
           TABS
        ========================== */

        .tab-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;

            background: #222;
            border: 1px solid #444;

            color: #ddd;
            cursor: pointer;

            transition: 0.2s;
        }

        .tab-button.active {
            background: linear-gradient(180deg, #ffd700, #b8860b);
            color: black;
        }

        /* =========================
           SEARCH
        ========================== */

        .search-group {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        #search-keyword {
            flex: 1;

            padding: 12px;

            background: #0c0c0c;
            border: 2px solid #333;

            color: white;
        }

        #search-keyword:focus {
            outline: none;
            border-color: var(--gold);
        }

        #search-button {
            padding: 12px 14px;

            background: linear-gradient(180deg, #ff3b3b, #7a0000);
            border: none;

            color: white;
            font-weight: bold;

            cursor: pointer;
        }

        /* =========================
           LIST
        ========================== */

        #places-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        #places-list li {
            padding: 16px;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }

        #places-list li:hover {
            background: rgba(255,215,0,0.08);
        }

        .place-name {
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 6px;
        }

        .place-address {
            color: #aaa;
            font-size: 0.85rem;
        }

        /* =========================
           MAP
        ========================== */

        #map-section {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            filter: contrast(1.1) brightness(0.92);
        }

        /* =========================
           ROADVIEW
        ========================== */

        #roadview {
            position: absolute;
            bottom: 20px;
            right: 20px;

            width: 420px;
            height: 260px;

            border: 3px solid var(--gold);
            border-radius: 12px;

            overflow: hidden;

            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

    </style>
</head>

<body>

<!-- =========================
     LEFT PANEL
========================= -->

<div id="operation-desk">

    <div class="header-box">

        <div class="title">
            UNDERWORLD HQ
        </div>

        <div class="slogan">
            NO RISK, NO GLORY
        </div>

        <div class="warning">
            ⚠ SURVEILLANCE ACTIVE — MOVE SILENT
        </div>

        <div class="tab-group">

            <button class="tab-button active" id="bank-tab">
                BANKS
            </button>

            <button class="tab-button" id="gold-tab">
                GOLD SHOPS
            </button>

        </div>

        <div class="search-group">

            <input
                type="text"
                id="search-keyword"
                placeholder="TARGET INPUT REQUIRED..."
                value="은행">

            <button id="search-button">
                RAID
            </button>

        </div>

    </div>

    <ul id="places-list"></ul>

</div>

<!-- =========================
     MAP
========================= -->

<div id="map-section">

    <div id="map"></div>

    <div id="roadview"></div>

</div>

<!-- =========================
     KAKAO MAP SCRIPT
========================= -->

<script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d5dd97a46923dda3a649e5e521134f5f&libraries=services&autoload=false">
</script>

<script>

let map;
let places;
let markers = [];
let roadview;
let roadviewClient;
let currentCategory = "BK9";

kakao.maps.load(function () {
    init();
});

function init() {

    map = new kakao.maps.Map(
        document.getElementById("map"),
        {
            center: new kakao.maps.LatLng(37.5665, 126.9780),
            level: 5
        }
    );

    places = new kakao.maps.services.Places();

    roadview = new kakao.maps.Roadview(
        document.getElementById("roadview")
    );

    roadviewClient = new kakao.maps.RoadviewClient();

    navigator.geolocation.getCurrentPosition(function (pos) {

        let userPos = new kakao.maps.LatLng(
            pos.coords.latitude,
            pos.coords.longitude
        );

        map.setCenter(userPos);

        new kakao.maps.Marker({
            map: map,
            position: userPos
        });

        searchPlaces();

    }, function () {
        searchPlaces();
    });

    document
        .getElementById("search-button")
        .addEventListener("click", searchKeyword);

    document
        .getElementById("bank-tab")
        .onclick = function () {
            currentCategory = "BK9";
            searchPlaces();
        };

    document
        .getElementById("gold-tab")
        .onclick = function () {
            currentCategory = "PM9";
            searchPlaces();
        };
}

function searchPlaces() {

    clearMarkers();

    places.categorySearch(
        currentCategory,
        function (data, status) {

            if (status === kakao.maps.services.Status.OK) {
                render(data);
            }

        },
        {
            location: map.getCenter(),
            radius: 5000
        }
    );
}

function searchKeyword() {

    let keyword =
        document.getElementById("search-keyword").value;

    if (!keyword.trim()) return;

    clearMarkers();

    places.keywordSearch(keyword, function (data, status) {
        if (status === kakao.maps.services.Status.OK) {
            render(data);
        }
    });
}

function render(data) {

    let list = document.getElementById("places-list");
    list.innerHTML = "";

    let bounds = new kakao.maps.LatLngBounds();

    data.forEach(function (p) {

        let pos = new kakao.maps.LatLng(p.y, p.x);

        let marker = new kakao.maps.Marker({
            map: map,
            position: pos
        });

        markers.push(marker);

        bounds.extend(pos);

        let li = document.createElement("li");
        li.innerHTML =
            `<div class="place-name">${p.place_name}</div>
             <div class="place-address">${p.address_name}</div>`;

        li.onclick = function () {
            map.setCenter(pos);

            roadviewClient.getNearestPanoId(pos, 50, function (panoId) {
                if (panoId) {
                    roadview.setPanoId(panoId, pos);
                }
            });
        };

        list.appendChild(li);
    });

    map.setBounds(bounds);
}

function clearMarkers() {
    markers.forEach(m => m.setMap(null));
    markers = [];
}

</script>

</body>
</html>
