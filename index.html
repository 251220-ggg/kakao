<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GANSTER's ROBBING MAP</title>

  <!-- 카카오맵 SDK -->
  <script
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d5dd97a46923dda3a649e5e521134f5f&libraries=services&autoload=false">
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      overflow: hidden;
      color: white;
    }

    /* 전체 레이아웃 */
    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* 왼쪽 패널 */
    .sidebar {
      width: 35%;
      background: #181818;
      border-right: 3px solid red;
      padding: 20px;
      overflow-y: auto;
    }

    /* 제목 */
    .title {
      font-size: 30px;
      font-weight: bold;
      color: red;
      margin-bottom: 20px;
      text-shadow: 0 0 10px red;
    }

    /* 검색 영역 */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      padding: 12px;
      background: #222;
      border: 2px solid red;
      color: white;
      border-radius: 8px;
      outline: none;
    }

    .search-box button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .search-box button:hover {
      background: #cc0000;
    }

    /* 검색 결과 카드 */
    .result-item {
      background: #222;
      border-left: 5px solid red;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .result-item:hover {
      background: #2e2e2e;
      transform: translateX(5px);
    }

    .place-name {
      color: #ff4d4d;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .place-address {
      font-size: 14px;
      color: #ccc;
    }

    /* 지도 */
    #map {
      width: 65%;
      height: 100vh;
    }

    /* 빨간 X 마커 */
    .x-marker {
      width: 40px;
      height: 40px;
      position: relative;
    }

    .x-marker::before,
    .x-marker::after {
      content: "";
      position: absolute;
      width: 40px;
      height: 6px;
      background: red;
      top: 17px;
      left: 0;
      border-radius: 10px;
      box-shadow: 0 0 10px red;
    }

    .x-marker::before {
      transform: rotate(45deg);
    }

    .x-marker::after {
      transform: rotate(-45deg);
    }

    /* 모바일 대응 */
    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 40%;
      }

      #map {
        width: 100%;
        height: 60%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 왼쪽 검색 영역 -->
    <div class="sidebar">

      <div class="title">
        BANK RAID MAP
      </div>

      <div class="search-box">
        <input
          type="text"
          id="keyword"
          placeholder="은행 검색..."
        />

        <button onclick="searchPlace()">
          SEARCH
        </button>
      </div>

      <div id="result-list"></div>

    </div>

    <!-- 오른쪽 지도 -->
    <div id="map"></div>

  </div>

  <script>

    let map;
    let currentPosition;
    let placeService;
    let overlays = [];

    // 카카오맵 SDK 로드 완료 후 실행
    kakao.maps.load(function () {

      // 위치 권한 요청
      navigator.geolocation.getCurrentPosition(

        // 위치 허용 성공
        function (position) {

          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          currentPosition = new kakao.maps.LatLng(
            latitude,
            longitude
          );

          // 지도 생성
          map = new kakao.maps.Map(
            document.getElementById("map"),
            {
              center: currentPosition,
              level: 5
            }
          );

          // 장소 검색 서비스 생성
          placeService = new kakao.maps.services.Places();

          // 현재 위치 마커 생성
          const currentMarker = new kakao.maps.Marker({
            map: map,
            position: currentPosition
          });

          // 현재 위치 인포윈도우
          const currentInfo = new kakao.maps.InfoWindow({
            content: `
              <div style="
                padding:10px;
                color:black;
                font-size:13px;
              ">
                현재 위치
              </div>
            `
          });

          currentInfo.open(map, currentMarker);

          // 기본 검색어
          document.getElementById("keyword").value = "은행";

          // 기본 검색 실행
          searchPlace();
        },

        // 위치 권한 거부
        function () {
          alert("위치 권한을 허용해주세요.");
        }

      );

    });

    // 장소 검색 함수
    function searchPlace() {

      const keyword = document
        .getElementById("keyword")
        .value
        .trim();

      if (!keyword) {
        alert("검색어를 입력하세요.");
        return;
      }

      // 현재 위치 기준 검색
      placeService.keywordSearch(
        keyword,
        placesSearchCallback,
        {
          location: currentPosition
        }
      );
    }

    // 검색 결과 처리 함수
    function placesSearchCallback(data, status) {

      if (status !== kakao.maps.services.Status.OK) {
        alert("검색 결과가 없습니다.");
        return;
      }

      displayPlaces(data);
    }

    // 장소 표시 함수
    function displayPlaces(places) {

      const resultList = document.getElementById("result-list");

      resultList.innerHTML = "";

      // 기존 오버레이 제거
      clearOverlays();

      const bounds = new kakao.maps.LatLngBounds();

      places.forEach(function (place) {

        const position = new kakao.maps.LatLng(
          place.y,
          place.x
        );

        // 지도 범위 확장
        bounds.extend(position);

        // 빨간 X 마커 생성
        const overlay = new kakao.maps.CustomOverlay({
          position: position,
          content: `<div class="x-marker"></div>`,
          yAnchor: 1
        });

        overlay.setMap(map);

        overlays.push(overlay);

        // 검색 결과 카드 생성
        const item = document.createElement("div");

        item.className = "result-item";

        item.innerHTML = `
          <div class="place-name">
            ${place.place_name}
          </div>

          <div class="place-address">
            ${place.address_name}
          </div>
        `;

        // 클릭 시 지도 이동
        item.addEventListener("click", function () {

          map.setCenter(position);

          const infoWindow = new kakao.maps.InfoWindow({
            position: position,
            content: `
              <div style="
                padding:10px;
                color:black;
                font-size:13px;
              ">
                <strong>${place.place_name}</strong><br>
                ${place.address_name}
              </div>
            `
          });

          infoWindow.open(map);
        });

        resultList.appendChild(item);

      });

      // 검색 결과 범위로 이동
      map.setBounds(bounds);
    }

    // 기존 마커 제거
    function clearOverlays() {

      overlays.forEach(function (overlay) {
        overlay.setMap(null);
      });

      overlays = [];
    }

  </script>

</body>
</html>
