<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 카카오맵 검색 서비스</title>
    <style>
        /* 1. 기본 레이아웃 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; }

        /* 화면을 왼쪽(사이드바)과 오른쪽(지도)으로 2분할 */
        .container { display: flex; width: 100%; height: 100vh; }

        /* 2. 왼쪽 사이드바 디자인 */
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .sidebar h2 { margin-bottom: 20px; font-size: 1.2rem; color: #333; }

        .search-box { display: flex; margin-bottom: 20px; }
        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px 0 0 4px;
            outline: none;
        }
        .search-box button {
            padding: 10px 15px;
            background-color: #fee500; /* 카카오 테마색 */
            border: 1px solid #ccc;
            border-left: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 0 4px 4px 0;
        }

        /* 검색 결과 리스트 스타일 */
        #result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }
        .result-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .result-item:hover { background-color: #f0f0f0; }
        .result-item strong { display: block; color: #222; margin-bottom: 5px; }
        .result-item span { font-size: 0.85rem; color: #666; }

        /* 3. 오른쪽 지도 영역 디자인 */
        .map-area { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>📍 장소 검색 서비스</h2>
        <div class="search-box">
            <input type="text" id="keyword" placeholder="검색어를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <ul id="result-list">
            </ul>
    </div>

    <div class="map-area">
        <div id="map"></div>
    </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d5dd97a46923dda3a649e5e521134f5f&libraries=services"></script>

<script>
    // 1. 지도 초기화
    const mapContainer = document.getElementById('map'); 
    const mapOptions = {
        center: new kakao.maps.LatLng(37.66, 126.83), // 학교 위치 설정
        level: 5 // 확대 레벨 설정
    };

    const map = new kakao.maps.Map(mapContainer, mapOptions); // 지도 생성
    const placeService = new kakao.maps.services.Places(); // 장소 검색 객체
    const infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 }); // 클릭 시 띄울 팝업
    let markers = []; // 생성된 마커들을 관리할 배열

    // 2. 장소 검색 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.trim()) {
            alert('검색어를 입력해 주세요!');
            return;
        }

        // 카카오 API를 이용해 키워드로 장소 검색 요청
        placeService.keywordSearch(keyword, placesSearchCB);
    }

    // 3. 장소검색 완료 시 호출되는 콜백 함수
    function placesSearchCB(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data); // 검색 성공 시 화면 표시
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 없습니다.');
        } else {
            alert('오류가 발생했습니다.');
        }
    }

    // 4. 검색 결과 목록과 마커를 화면에 그리는 함수
    function displayPlaces(places) {
        const listElement = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds(); // 지도 범위를 맞추기 위한 객체

        removeMarkers(); // 기존 마커 제거
        listElement.innerHTML = ''; // 기존 목록 제거

        places.forEach((place) => {
            const placePosition = new kakao.maps.LatLng(place.y, place.x);
            const marker = addMarker(placePosition); // 지도에 마커 추가
            
            // 리스트 아이템 생성
            const itemElement = document.createElement('li');
            itemElement.className = 'result-item';
            itemElement.innerHTML = `<strong>${place.place_name}</strong>
                                     <span>${place.road_address_name || place.address_name}</span>`;

            // 목록 아이템을 클릭했을 때의 이벤트
            itemElement.onclick = () => {
                map.panTo(placePosition); // 지도를 해당 위치로 부드럽게 이동
                displayInfoWindow(marker, place.place_name); // 정보창 표시
            };

            listElement.appendChild(itemElement);
            bounds.extend(placePosition); // 지도의 경계 범위에 현재 위치 추가
        });

        // 모든 검색 결과가 보이도록 지도 범위 재설정
        map.setBounds(bounds);
    }

    // 마커 생성 및 지도 표시 함수
    function addMarker(position) {
        const marker = new kakao.maps.Marker({
            position: position,
            map: map
        });
        markers.push(marker);
        return marker;
    }

    // 기존의
