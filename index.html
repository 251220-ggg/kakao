<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANGSTER's ROBBING MAP</title>
    <style>
        /* 갱스터 스타일의 다크&골드 테마 설정 */
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --accent-color: #ffd700; /* 금괴 색상 */
            --text-color: #ffffff;
            --border-color: #444444;
            --danger-color: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* 왼쪽 작전 데스크 */
        #operation-desk {
            width: 350px;
            height: 100%;
            background-color: var(--panel-bg);
            border-right: 3px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        /* 탭 구역 */
        .tab-box {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .tab-box h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background-color: #111;
            color: #fff;
            border: 1px solid var(--border-color);
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* 결과 리스트 구역 */
        #places-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        #places-list li {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
        }

        #places-list li:hover {
            background-color: #3d3d3d;
            border-left: 4px solid var(--accent-color);
        }

        #places-list .place-name {
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        #places-list .place-address {
            font-size: 0.85rem;
            color: #ccc;
        }

        /* 커스텀 말풍선 (오버레이) 스타일 */
        .gangster-popup {
            background-color: #1a1a1a;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            padding: 15px;
            width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            position: relative;
            bottom: 50px; /* 마커 위로 띄우기 */
            left: -125px; /* 가운데 정렬 */
        }

        .gangster-popup::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            margin-left: -10px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: var(--accent-color) transparent transparent transparent;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .popup-title {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .close-btn {
            color: var(--danger-color);
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .popup-address {
            color: #fff;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .roadview-btn {
            display: block;
            text-align: center;
            background-color: #333;
            color: var(--accent-color);
            text-decoration: none;
            padding: 8px;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid var(--accent-color);
            transition: 0.2s;
        }

        .roadview-btn:hover {
            background-color: var(--accent-color);
            color: #000;
        }

        /* 오른쪽 전술 지도 */
        #tactical-map {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="operation-desk">
        <div class="tab-box">
            <h2>💰 TARGET SCANNER</h2>
            <div class="tab-buttons">
                <button class="tab-btn active" id="tab-bank" onclick="switchTab('bank')">🏦 은행 타겟</button>
                <button class="tab-btn" id="tab-jewel" onclick="switchTab('jewel')">💎 금은방 타겟</button>
            </div>
        </div>
        <ul id="places-list"></ul>
    </div>

    <div id="tactical-map"></div>
