        .result-item p { font-size: 0.95rem; line-height: 1.4; margin-bottom: 5px; }
        .result-item .info-link { font-size: 0.9rem; color: #b8860b; text-decoration: none; font-weight: bold; font-family: 'Pirata One', cursive; }

        /* 오른쪽 지도 영역 */
        .map-area { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        /* 커스텀 오버레이 스타일 (디자인 깨짐 방지 말꼬리 포함) */
        .custom-overlay { 
            position: relative;
            bottom: 50px; 
            padding: 12px; 
            min-width: 160px; 
            line-height: 1.5; 
            background-color: #f3e5ab; 
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png'); 
            border: 2px solid #3e2723; 
            border-radius: 8px; 
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3); 
            font-family: 'Cormorant Garamond', serif; 
            color: #3e2723; 
        }
        .custom-overlay strong { color: #c0392b; font-family: 'Pirata One', cursive; font-size: 1.1rem; }
        .custom-overlay small { color: #5d4037; font-size: 0.9rem; }
        .custom-overlay::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #3e2723 transparent;
            display: block;
            width: 0;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="sidebar">
        <div class="header">
            <h2>☠ 보물 탐색 지도</h2>
            <div class="search-box">
                <input type="text" id="keyword" placeholder="예: 맛집, 카페, 편의점" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
        </div>
        <ul id="result-list">
            </ul>
    </div>

    <div class="map-area">
        <div id="map"></div>
    </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d5dd97a46923dda3a649e5e521134f5f&libraries=services"></script>

<script>
    // 1. 지도 초기화
    const mapContainer = document.getElementById('map'); 
    const mapOptions = {
        center: new kakao.maps.LatLng(37.66, 126.83), // 초기 중심 좌표 (학교)
        level: 5 // 초기 확대 레벨
    };

    const map = new kakao.maps.Map(mapContainer, mapOptions); // 지도 객체 생성
    const placeService = new kakao.maps.services.Places(); // 장소 검색 서비스 객체
    const infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 }); // 정보창 객체
    let markers = []; // 생성된 마커들을 저장할 배열

    // 2. 장소 검색 실행 함수
    function searchPlaces() {
        const keywordInput = document.getElementById('keyword').value;

        if (!keywordInput.trim()) {
            alert('검색어를 입력해 주세요!');
            return;
        }

        // 현재 지도 중심 좌표를 기준으로 주변 장소 검색 (location 옵션 사용)
        const searchOptions = {
            location: map.getCenter(), // 현재 지도의 중심 좌표
            radius: 5000,              // 중심으로부터 5km 반경 이내 검색
            sort: kakao.maps.services.SortBy.DISTANCE // 거리순 정렬
        };

        // 카카오 서버에 장소 검색 요청
        placeService.keywordSearch(keywordInput, placesSearchCallback, searchOptions);
    }

    // 3. 검색 완료 시 결과를 처리하는 콜백 함수
    function placesSearchCallback(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayResults(data); // 결과가 있으면 화면에 표시
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('주변에 검색 결과가 없습니다.');
        } else {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 4. 검색 결과 목록과 마커를 화면에 표시하는 함수
    function displayResults(places) {
        const listElement = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds(); // 지도 범위를 재설정하기 위한 객체

        removeMarkers(); // 이전 검색 마커들 지우기
        listElement.innerHTML = ''; // 이전 리스트 내용 지우기

        places.forEach((place) => {
            const placePosition = new kakao.maps.LatLng(place.y, place.x);
            const marker = addMarker(placePosition); // 마커 생성 및 지도 표시
            
            // 영업시간은 API에서 제공하지 않으므로 상세페이지 링크로 대체
            const address = place.road_address_name || place.address_name;
            const detailUrl = place.place_url; // 장소 상세 정보(영업시간 등 포함) 페이지 주소

            // 왼쪽 리스트에 추가할 아이템(HTML) 생성 (해적 컨셉에 맞게 수정)
            const itemElement = document.createElement('li');
            itemElement.className = 'result-item';
            itemElement.innerHTML = `
                <img src="https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/treasure_box.png" style="width:20px; float:right; margin-top:5px;">
                <strong>${place.place_name}</strong>
                <p>📍 ${address}</p>
                <p>📞 ${place.phone || '번호 없음'}</p>
                <a href="${detailUrl}" target="_blank" class="info-link">보물 지도로 이동 ☠</a>
            `;

            // 리스트 아이템 클릭 시 지도 이동 및 정보창 표시
            itemElement.onclick = () => {
                map.panTo(placePosition);
                showInfoWindow(marker, place.place_name, address, detailUrl);
            };

            // 마커 클릭 시 정보창 표시
            kakao.maps.event.addListener(marker, 'click', () => {
                showInfoWindow(marker, place.place_name, address, detailUrl);
            });

            listElement.appendChild(itemElement);
            bounds.extend(placePosition); // 전체 결과를 포함하도록 범위 확장
        });

        // 검색된 장소들이 모두 보이도록 지도 중심/레벨 조정
        map.setBounds(bounds);
    }

    // 마커를 생성하고 배열에 관리하는 함수 (커스텀 마커 이미지 적용)
    function addMarker(position) {
        // 커스텀 마커 이미지 설정 (보물상자 이미지 활용)
        const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/treasure_box.png'; // 카카오맵 샘플 이미지 활용
        const imageSize = new kakao.maps.Size(34, 34); // 마커 이미지 크기
        const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);

        const marker = new kakao.maps.Marker({
            position: position,
            image: markerImage, // 커스텀 이미지 적용
            map: map
        });
        markers.push(marker);
        return marker;
    }

    // 기존 마커를 지도에서 제거하는 함수
    function removeMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
    }

    // 지도 위 팝업(정보창)을 띄우는 함수 (해적 컨셉에 맞게 HTML 수정)
    function showInfoWindow(marker, name, address, url) {
        const content = `
            <div class="custom-info pirate-info">
                <img src="https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/treasure_box.png" style="width:20px; vertical-align:middle; margin-right:5px;">
                <strong>${name}</strong><br>
                <small style="color:#2c1a0a;">📍 ${address}</small><br>
                <a href="${url}" target="_blank" style="font-size:11px; color:#c0392b; font-weight:bold;">보물 지도로 이동 ☠</a>
            </div>
        `;
        infoWindow.setContent(content);
        infoWindow.open(map, marker);
    }
</script>
